services:
  api:
    build: ./api
    restart: unless-stopped
    ports: ["8000:8000"]              # NPM이 프록시할 포트
    environment:
      - DATABASE_URL=postgresql://wiki:${POSTGRES_PASSWORD:-devpass}@postgres:5432/llm_wiki
      - READONLY_DATABASE_URL=postgresql://wiki_ro:ro_devpass@postgres:5432/llm_wiki
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - WIKI_REPO_PATH=/data/wiki
      - ADMIN_API_KEY=${ADMIN_API_KEY:-devkey}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - wiki-data:/data/wiki
      - sources-data:/data/sources
      - model-cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started

  ingest-worker:
    build: ./api
    command: celery -A tasks worker --concurrency=2 --loglevel=info
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://wiki:${POSTGRES_PASSWORD:-devpass}@postgres:5432/llm_wiki
      - READONLY_DATABASE_URL=postgresql://wiki_ro:ro_devpass@postgres:5432/llm_wiki
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - WIKI_REPO_PATH=/data/wiki
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - wiki-data:/data/wiki
      - sources-data:/data/sources
      - model-cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16
    restart: unless-stopped
    ports: ["127.0.0.1:5433:5432"]
    environment:
      - POSTGRES_DB=llm_wiki
      - POSTGRES_USER=wiki
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-devpass}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki -d llm_wiki"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage

  frontend:
    build: ./frontend
    ports: ["3000:3000"]              # NPM이 프록시할 포트
    restart: unless-stopped
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  pg-data:
  qdrant-data:
  wiki-data:
  sources-data:
  model-cache:
