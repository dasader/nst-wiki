<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nst-wiki 관리 콘솔</title>
<style>
  /* 프런트엔드(globals.css)와 동일 토큰·타이포. ponytail: 별도 오리진이라 import 불가 → 인라인 */
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css");
  :root {
    --bg: #f4f6f9; --surface: #fff; --surface-2: #f8fafc;
    --ink: #1a2430; --ink-2: #516072; --ink-3: #8a97a6;
    --line: #e4e9f0; --line-strong: #d3dae3;
    --accent: #0b6e75; --accent-strong: #095a60; --accent-tint: #e7f1f1;
    --danger: #b23a3a; --danger-tint: #fbeeed;
    --amber: #8a6100; --amber-tint: #fdf3d9;
    --info: #2c5cc4; --info-tint: #e9f0fd;
    --success: #1c7a45; --success-tint: #e6f4ec;
    --radius: 12px; --radius-sm: 8px;
    --shadow: 0 1px 2px rgba(20,39,63,.04), 0 2px 8px rgba(20,39,63,.05);
    --shadow-lg: 0 12px 40px rgba(20,39,63,.16);
    --font: "Pretendard Variable", Pretendard, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, "SFMono-Regular", "JetBrains Mono", "D2Coding", monospace;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; font-family: var(--font); font-size: 15px; line-height: 1.6;
    color: var(--ink); background: var(--bg);
    -webkit-font-smoothing: antialiased; word-break: keep-all;
  }
  [hidden] { display: none !important; }

  /* 브랜드 마크 (게이트·헤더 공용) */
  .mark {
    border-radius: 9px; color: #fff;
    background: linear-gradient(135deg, var(--accent), #0f8a86);
    display: grid; place-items: center; font-weight: 800; letter-spacing: -.02em;
  }

  /* ── 로그인 게이트 ─────────────────────────── */
  /* 콘솔로 들어서는 유일한 문 — 페이지의 시그니처. 미묘한 방사형 틴트 위 단독 카드. */
  .gate {
    position: fixed; inset: 0; z-index: 100;
    display: grid; place-items: center; padding: 24px;
    background:
      radial-gradient(120% 80% at 50% -10%, var(--accent-tint), transparent 60%),
      var(--bg);
  }
  .gate-card {
    width: 100%; max-width: 372px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 16px;
    box-shadow: var(--shadow-lg); padding: 32px 30px 28px; text-align: center;
  }
  .gate-card .mark { width: 46px; height: 46px; font-size: 17px; margin: 0 auto 18px; }
  .gate-card h1 { font-size: 1.15rem; margin: 0 0 4px; letter-spacing: -.01em; }
  .gate-card .sub { color: var(--ink-3); font-size: 12.5px; margin: 0 0 24px; letter-spacing: .01em; }
  .gate-form { display: flex; flex-direction: column; gap: 10px; text-align: left; }
  .gate-form label { font-size: 12px; font-weight: 600; color: var(--ink-2); }
  .gate-msg { min-height: 18px; font-size: 12.5px; color: var(--danger); margin: 2px 0 0; }
  .gate-hint { margin: 16px 0 0; font-size: 11.5px; color: var(--ink-3); line-height: 1.5; }

  /* ── 콘솔 셸 ───────────────────────────────── */
  .site-header {
    height: 56px; display: flex; align-items: center; gap: 12px; padding: 0 20px;
    background: rgba(255,255,255,.9); backdrop-filter: saturate(180%) blur(8px);
    border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 30;
  }
  .brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
  .brand .mark { width: 28px; height: 28px; font-size: 13px; }
  .brand .name { font-weight: 700; font-size: 14px; letter-spacing: -.01em; }
  .brand .name small { display: block; font-weight: 500; font-size: 10px; color: var(--ink-3); letter-spacing: .02em; }
  .header-tag { font-size: 11px; font-weight: 700; color: var(--accent-strong); background: var(--accent-tint); padding: 4px 10px; border-radius: 999px; letter-spacing: .03em; }
  .header-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  /* ── KPI/필터 스트립 ──────────────────────── */
  /* 타일 하나가 상태 요약 + 필터를 겸한다(Linear식) — 눌러서 큐를 좁힌다. */
  .kpi {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
    padding: 16px 20px; border-bottom: 1px solid var(--line); background: var(--surface);
  }
  .tile {
    text-align: left; background: var(--surface-2); border: 1px solid var(--line);
    border-radius: var(--radius-sm); padding: 11px 13px; cursor: pointer;
    display: flex; flex-direction: column; gap: 3px; transition: border-color .12s, background .12s, box-shadow .12s;
  }
  .tile:hover { border-color: var(--line-strong); background: var(--surface); }
  .tile.on { border-color: var(--accent); background: var(--accent-tint); box-shadow: 0 0 0 1px var(--accent) inset; }
  .tile .n { font-size: 1.35rem; font-weight: 800; letter-spacing: -.02em; font-variant-numeric: tabular-nums; line-height: 1.1; }
  .tile .k { font-size: 11.5px; font-weight: 600; color: var(--ink-2); }
  .tile.on .k { color: var(--accent-strong); }
  .tile.t-staged .n { color: var(--amber); }
  .tile.t-proc .n { color: var(--info); }
  .tile.t-approved .n { color: var(--success); }
  .tile.t-rejfail .n { color: var(--ink-3); }

  /* ── 2단 레이아웃 ─────────────────────────── */
  .app { display: flex; height: calc(100vh - 56px - 90px); }
  .queue { width: 340px; flex: 0 0 340px; border-right: 1px solid var(--line); background: var(--surface); overflow-y: auto; padding: 14px; }
  .queue .caption { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--ink-3); margin: 2px 2px 10px; }
  .detail { flex: 1; overflow-y: auto; padding: 24px 28px; background: var(--bg); }

  /* ── 태스크 카드 ──────────────────────────── */
  .task {
    display: grid; grid-template-columns: auto 1fr; gap: 3px 9px; align-items: center;
    padding: 11px 12px; border: 1px solid var(--line); border-radius: var(--radius-sm);
    background: var(--surface); margin: 0 0 8px; cursor: pointer; font-size: 12px;
    transition: border-color .12s, box-shadow .12s;
  }
  .task:hover { border-color: var(--line-strong); box-shadow: var(--shadow); }
  .task.sel { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .task .title { font-weight: 600; font-size: 13px; color: var(--ink); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .task .meta { grid-column: 2; display: flex; gap: 8px; color: var(--ink-3); font-size: 11px; }
  .task .meta code { font-family: var(--mono); }
  .queue .empty { color: var(--ink-3); text-align: center; padding: 40px 0; font-size: 13px; }

  /* ── 상태 배지 ─────────────────────────────── */
  .badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: var(--surface-2); color: var(--ink-2); white-space: nowrap; }
  .b-staged { background: var(--amber-tint); color: var(--amber); }
  .b-approved { background: var(--success-tint); color: var(--success); }
  .b-rejected, .b-failed { background: var(--danger-tint); color: var(--danger); }
  .b-queued, .b-parsing, .b-classifying { background: var(--info-tint); color: var(--info); }

  /* ── 폼 / 버튼 ─────────────────────────────── */
  input, select, textarea {
    font: inherit; color: var(--ink); width: 100%;
    padding: 9px 11px; border: 1px solid var(--line-strong); border-radius: var(--radius-sm);
    background: var(--surface); transition: border-color .15s, box-shadow .15s;
  }
  input::placeholder { color: var(--ink-3); }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-tint); }
  textarea { font-family: var(--mono); font-size: 12px; line-height: 1.55; resize: vertical; }
  label.inline { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-2); }
  label.inline input { width: auto; }

  button, .btn {
    font: inherit; font-weight: 600; font-size: .9rem;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 15px; border: 1px solid transparent; border-radius: var(--radius-sm);
    background: var(--accent); color: #fff; cursor: pointer;
    transition: background .15s, border-color .15s, transform .05s;
  }
  button:hover, .btn:hover { background: var(--accent-strong); }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  button:focus-visible, .btn:focus-visible, .tile:focus-visible, .task:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--accent-tint); }
  .btn-ghost { background: var(--surface); color: var(--ink); border-color: var(--line-strong); }
  .btn-ghost:hover { background: var(--surface-2); border-color: var(--ink-3); }
  .btn-danger { background: var(--danger); } .btn-danger:hover { background: #9a3030; }
  .btn-sm { padding: 6px 11px; font-size: .82rem; }
  #approve { background: var(--success); } #approve:hover { background: #166638; }
  #reject { background: var(--danger); } #reject:hover { background: #9a3030; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin: 0 0 4px; }

  /* ── 슬라이드오버 드로어 ──────────────────── */
  .scrim { position: fixed; inset: 0; z-index: 40; background: rgba(20,39,63,.34); backdrop-filter: blur(1px); }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 50;
    width: 420px; max-width: 92vw; background: var(--surface);
    border-left: 1px solid var(--line); box-shadow: var(--shadow-lg);
    display: flex; flex-direction: column; transform: translateX(100%);
    transition: transform .22s cubic-bezier(.4,0,.2,1);
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head { display: flex; align-items: center; gap: 10px; padding: 15px 18px; border-bottom: 1px solid var(--line); }
  .drawer-head h2 { font-size: 1rem; margin: 0; }
  .drawer-head .x { margin-left: auto; width: 30px; height: 30px; padding: 0; background: none; color: var(--ink-3); border: 0; font-size: 18px; }
  .drawer-head .x:hover { background: var(--surface-2); color: var(--ink); border-radius: 7px; }
  .drawer-body { padding: 18px; overflow-y: auto; flex: 1; }
  .field-label { font-size: 12px; font-weight: 600; color: var(--ink-2); margin: 0 0 5px; }

  /* 업로드 드롭존/행 */
  #dropzone {
    border: 1.5px dashed var(--line-strong); border-radius: var(--radius-sm);
    padding: 22px 14px; text-align: center; color: var(--ink-3); cursor: pointer; font-size: 13px;
    transition: border-color .15s, background .15s, color .15s;
  }
  #dropzone:hover { border-color: var(--accent); color: var(--ink-2); }
  #dropzone.drag { border-color: var(--accent); background: var(--accent-tint); color: var(--accent-strong); }
  .uprow { border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--surface-2); padding: 10px 12px; margin: 8px 0; font-size: 12px; position: relative; }
  .uprow b { font-size: 13px; }
  .uprow input { margin: 5px 0 0; padding: 6px 8px; font-size: 12px; }
  .uprow .rm { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; padding: 0; background: none; color: var(--ink-3); border: 0; font-size: 14px; line-height: 1; }
  .uprow .rm:hover { background: var(--danger-tint); color: var(--danger); }
  .uprow .st { margin-top: 7px; color: var(--ink-2); font-weight: 500; }
  .uprow .st.err { color: var(--danger); } .uprow .st.ok { color: var(--success); }

  /* ── 상세 패널 ─────────────────────────────── */
  .detail h2 { font-size: 1.2rem; margin: 0 0 6px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; letter-spacing: -.01em; }
  .detail .tid { font-family: var(--mono); font-size: 12px; color: var(--ink-3); margin: 0 0 16px; }
  .detail h3 { font-size: 1rem; margin: 22px 0 8px; }
  .detail h4 { font-size: .9rem; margin: 16px 0 6px; color: var(--ink-2); }
  .detail ul { padding-left: 1.2em; }
  .placeholder { color: var(--ink-3); text-align: center; padding: 72px 20px; }
  .placeholder .big { font-size: 2rem; margin-bottom: 10px; opacity: .5; }

  .tbl-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--surface); margin: 8px 0; }
  .detail table { border-collapse: collapse; font-size: 12px; width: 100%; font-variant-numeric: tabular-nums; }
  .detail th { background: var(--surface-2); color: var(--ink-2); font-weight: 700; text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--line-strong); white-space: nowrap; }
  .detail td { padding: 6px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
  .detail tr:last-child td { border-bottom: 0; }
  .detail pre { background: #0f1b26; color: #d6e2ec; padding: 14px 16px; border-radius: var(--radius-sm); overflow-x: auto; font-size: 12px; line-height: 1.55; font-family: var(--mono); }

  .contradiction {
    border: 1px solid #ecd9a3; border-left: 3px solid var(--amber); background: var(--amber-tint);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 12px 14px; margin: 8px 0; font-size: 13px;
  }
  .contradiction label { display: inline-flex; align-items: center; gap: 5px; margin-right: 14px; font-size: 12px; color: var(--ink-2); }
  .contradiction input { width: auto; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--accent-tint); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -2px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { *, .drawer { transition-duration: .001ms !important; animation-duration: .001ms !important; } }

  /* ── 반응형 ────────────────────────────────── */
  @media (max-width: 860px) {
    .kpi { grid-template-columns: repeat(3, 1fr); padding: 12px; }
    .app { flex-direction: column; height: auto; }
    .queue { width: 100%; flex: none; border-right: 0; border-bottom: 1px solid var(--line); }
    .detail { padding: 20px 16px; }
    .header-tag { display: none; }
  }
</style>
</head>
<body>

<!-- ── 로그인 게이트 ── -->
<div class="gate" id="gate" hidden>
  <div class="gate-card">
    <div class="mark">NST</div>
    <h1>관리 콘솔</h1>
    <p class="sub">국가전략기술 지식베이스 · NEXT</p>
    <form class="gate-form" id="gateForm">
      <label for="gateKey">관리자 키</label>
      <input id="gateKey" type="password" placeholder="관리자 키를 입력하세요" autocomplete="off" autofocus>
      <button id="gateBtn" type="submit">진입</button>
      <p class="gate-msg" id="gateMsg"></p>
    </form>
    <p class="gate-hint">승인·업로드·삭제 권한이 필요한 화면입니다.<br>키는 이 브라우저에만 저장됩니다.</p>
  </div>
</div>

<!-- ── 콘솔 ── -->
<div id="console" hidden>
  <header class="site-header">
    <a href="/" class="brand">
      <span class="mark">NST</span>
      <span class="name">국가전략기술 지식베이스<small>NEXT · 정책 인텔리전스</small></span>
    </a>
    <span class="header-tag">관리 콘솔</span>
    <div class="header-actions">
      <button class="btn-ghost btn-sm" onclick="openDrawer('upload')">＋ 문서 업로드</button>
      <button class="btn-ghost btn-sm" onclick="openDrawer('edit')">위키 편집</button>
      <button class="btn-ghost btn-sm" onclick="lock()">잠금</button>
    </div>
  </header>

  <div class="kpi" id="kpi">
    <button class="tile on" data-f="all"><span class="n" id="n-all">0</span><span class="k">전체</span></button>
    <button class="tile t-staged" data-f="staged"><span class="n" id="n-staged">0</span><span class="k">승인 대기</span></button>
    <button class="tile t-proc" data-f="proc"><span class="n" id="n-proc">0</span><span class="k">처리 중</span></button>
    <button class="tile t-approved" data-f="approved"><span class="n" id="n-approved">0</span><span class="k">승인됨</span></button>
    <button class="tile t-rejfail" data-f="rejfail"><span class="n" id="n-rejfail">0</span><span class="k">거부·실패</span></button>
  </div>

  <div class="app">
    <aside class="queue">
      <p class="caption">처리 대기 · 이력</p>
      <div id="tasks"></div>
    </aside>
    <section class="detail" id="detail">
      <div class="placeholder"><div class="big">◨</div>왼쪽에서 태스크를 선택하면 검토 내용이 표시됩니다.</div>
    </section>
  </div>
</div>

<!-- ── 드로어: 문서 업로드 ── -->
<aside class="drawer" id="drawer-upload">
  <div class="drawer-head"><h2>문서 업로드</h2><button class="x" onclick="closeDrawer()" aria-label="닫기">✕</button></div>
  <div class="drawer-body">
    <div id="dropzone">파일을 여기로 끌어다 놓거나 클릭해 선택
      <input id="filepick" type="file" multiple accept=".pdf,.md,.xlsx" hidden></div>
    <p class="field-label" style="margin:8px 0 0">PDF · Markdown · XLSX · 최대 50MB</p>
    <div id="uprows"></div>
    <div id="upctl" hidden style="margin-top:12px">
      <label class="inline"><input id="force" type="checkbox"> 기존 문서 덮어쓰기(force)</label>
      <button id="uploadbtn" style="width:100%;margin-top:10px" onclick="startUpload()">전체 업로드</button>
    </div>
  </div>
</aside>

<!-- ── 드로어: 위키 편집 ── -->
<aside class="drawer" id="drawer-edit">
  <div class="drawer-head"><h2>위키 페이지 편집</h2><button class="x" onclick="closeDrawer()" aria-label="닫기">✕</button></div>
  <div class="drawer-body">
    <p class="field-label">경로</p>
    <div style="display:flex;gap:6px">
      <input id="editpath" placeholder="tech/hbm.md" style="flex:1;min-width:0">
      <button class="btn-ghost btn-sm" style="flex:none" onclick="loadPage()">불러오기</button>
    </div>
    <p class="field-label" style="margin-top:12px">내용 (Markdown)</p>
    <textarea id="editbody" style="height:340px"></textarea>
    <button style="width:100%;margin-top:10px" onclick="savePage()">저장 (main에 직접 커밋)</button>
  </div>
</aside>

<div class="scrim" id="scrim" hidden onclick="closeDrawer()"></div>

<script>
const $ = (s) => document.querySelector(s);
const adminKey = () => localStorage.getItem("adminkey") || "";

// ── 상태 그룹/라벨 ──
const GROUP = { staged: "staged", approved: "approved",
  queued: "proc", parsing: "proc", classifying: "proc",
  rejected: "rejfail", failed: "rejfail" };
const STATUS_LABEL = { staged: "검토 대기", approved: "승인됨", rejected: "거부",
  failed: "실패", queued: "대기", parsing: "파싱 중", classifying: "분류 중" };
const label = (s) => STATUS_LABEL[s] || s;

// ── 로그인 게이트 ──
async function verifyKey(key) {
  try { return (await fetch("/api/v1/admin/verify", { headers: { "X-Admin-Key": key } })).ok; }
  catch { return false; }
}
function showGate() {
  $("#console").hidden = true; $("#gate").hidden = false;
  clearInterval(refreshTimer); refreshTimer = null;
  $("#gateKey").value = ""; $("#gateMsg").textContent = ""; $("#gateKey").focus();
}
function enterConsole() {
  $("#gate").hidden = true; $("#console").hidden = false;
  loadList();
  refreshTimer = setInterval(loadList, 15000);
}
function lock() { localStorage.removeItem("adminkey"); showGate(); }

$("#gateForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const key = $("#gateKey").value.trim();
  if (!key) return;
  const btn = $("#gateBtn"); btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 확인 중';
  $("#gateMsg").textContent = "";
  if (await verifyKey(key)) { localStorage.setItem("adminkey", key); enterConsole(); }
  else $("#gateMsg").textContent = "키가 올바르지 않습니다.";
  btn.disabled = false; btn.textContent = "진입";
});

// ── 드로어 ──
function openDrawer(which) {
  $("#scrim").hidden = false;
  const d = $(`#drawer-${which}`);
  d.classList.add("open");
  (which === "upload" ? $("#dropzone") : $("#editpath")).focus?.();
}
function closeDrawer() {
  $("#scrim").hidden = true;
  document.querySelectorAll(".drawer.open").forEach(d => d.classList.remove("open"));
}
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeDrawer(); });

// ── 업로드 ──
const ALLOWED_EXTS = [".pdf", ".md", ".xlsx"];   // 서버 ALLOWED_EXTS와 동일
const MAX_MB = 50;   // ponytail: 개인용 기본값, 서버가 거부하면 상향
function validateFile(file, maxMB = MAX_MB) {
  const ext = (file.name.match(/\.[^.]+$/) || [""])[0].toLowerCase();
  if (!ALLOWED_EXTS.includes(ext)) return `지원하지 않는 형식: ${ext || "(없음)"}`;
  if (file.size > maxMB * 1024 * 1024) return `용량 초과: ${(file.size / 1048576).toFixed(1)}MB > ${maxMB}MB`;
  return null;
}
const uploadQueue = [];
let upSeq = 0;
const dz = $("#dropzone"), pick = $("#filepick");
dz.onclick = () => pick.click();
pick.onchange = () => { addFiles(pick.files); pick.value = ""; };
dz.ondragover = (e) => { e.preventDefault(); dz.classList.add("drag"); };
dz.ondragleave = () => dz.classList.remove("drag");
dz.ondrop = (e) => { e.preventDefault(); dz.classList.remove("drag"); addFiles(e.dataTransfer.files); };

function addFiles(fileList) {
  for (const file of fileList) {
    const item = { file, id: ++upSeq };
    uploadQueue.push(item);
    renderRow(item);
  }
  $("#upctl").hidden = uploadQueue.length === 0;
}
function baseName(name) { return name.replace(/\.[^.]+$/, ""); }

function renderRow(item) {
  const err = validateFile(item.file);
  const row = document.createElement("div");
  row.className = "uprow";
  row.id = `uprow-${item.id}`;
  row.innerHTML = `
    <button class="rm" title="제거" onclick="removeRow(${item.id})">✕</button>
    <b>${escapeHtml(item.file.name)}</b> <small>(${(item.file.size/1048576).toFixed(1)}MB)</small>
    <input data-f="title" placeholder="제목" value="${escapeHtml(baseName(item.file.name))}">
    <input data-f="publisher" placeholder="발행기관">
    <input data-f="tags" placeholder="태그(쉼표구분)">
    <input data-f="publish_date" placeholder="발행일 예: 2026">
    <div class="st ${err ? "err" : ""}">${err ? escapeHtml(err) : "대기"}</div>`;
  $("#uprows").appendChild(row);
  item.statusEl = row.querySelector(".st");
  item.invalid = !!err;
}
function removeRow(id) {
  const i = uploadQueue.findIndex(x => x.id === id);
  if (i >= 0) uploadQueue.splice(i, 1);
  document.getElementById(`uprow-${id}`)?.remove();
  $("#upctl").hidden = uploadQueue.length === 0;
}
function startUpload() {
  if (!adminKey()) return alert("관리자 키가 없습니다. 다시 로그인하세요.");
  uploadSequential(uploadQueue.filter(x => !x.invalid && !x.done));
}
// ponytail: 순차, 배치 커지면 병렬화
async function uploadSequential(items) {
  $("#uploadbtn").disabled = true;
  try { for (const item of items) await uploadOne(item); }
  finally { $("#uploadbtn").disabled = false; await loadList(); }
}
function uploadOne(item) {
  return new Promise((resolve) => {
    const row = document.getElementById(`uprow-${item.id}`);
    if (!row) return resolve();   // 업로드 중 제거된 행 — 조용히 건너뜀
    const fd = new FormData();
    fd.append("file", item.file);
    for (const inp of row.querySelectorAll("input[data-f]")) fd.append(inp.dataset.f, inp.value);
    fd.append("force", $("#force").checked ? "true" : "false");
    const xhr = new XMLHttpRequest();
    xhr.open("POST", "/api/v1/ingest");
    xhr.setRequestHeader("X-Admin-Key", adminKey());
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) item.statusEl.textContent = `업로드중 ${Math.round(e.loaded / e.total * 100)}%`;
    };
    xhr.onload = () => {
      if (xhr.status === 200) {
        let tid = "";
        try { tid = (JSON.parse(xhr.responseText).task_id || "").slice(0, 8); } catch {}
        item.statusEl.className = "st ok";
        item.statusEl.textContent = `✓ 큐등록 (task ${tid})`;
        item.done = true;
      } else {
        item.statusEl.className = "st err";
        item.statusEl.textContent = `✗ ${xhr.status} ${xhr.responseText.slice(0, 200)}`;
      }
      resolve();
    };
    xhr.onerror = () => { item.statusEl.className = "st err"; item.statusEl.textContent = "✗ 네트워크 오류"; resolve(); };
    item.statusEl.className = "st";
    xhr.send(fd);
  });
}

// ── 태스크 큐 ──
let current = null;
let currentSource8 = "";
let filter = "all";
let allTasks = [];

document.querySelectorAll(".tile").forEach(t => t.onclick = () => {
  filter = t.dataset.f;
  document.querySelectorAll(".tile").forEach(x => x.classList.toggle("on", x === t));
  renderTasks();
});

async function loadList() {
  const res = await fetch("/api/v1/ingest");
  allTasks = (await res.json()).tasks || [];
  const c = { all: allTasks.length, staged: 0, proc: 0, approved: 0, rejfail: 0 };
  for (const t of allTasks) c[GROUP[t.status]] = (c[GROUP[t.status]] || 0) + 1;
  for (const k of ["all", "staged", "proc", "approved", "rejfail"]) $(`#n-${k}`).textContent = c[k] || 0;
  renderTasks();
}

function renderTasks() {
  const rows = allTasks.filter(t => filter === "all" || GROUP[t.status] === filter);
  if (!rows.length) { $("#tasks").innerHTML = `<div class="empty">해당 상태의 태스크가 없습니다.</div>`; return; }
  $("#tasks").innerHTML = rows.map(t => `
    <div class="task ${t.task_id === current ? "sel" : ""}" tabindex="0" role="button"
         onclick="openTask('${t.task_id}')" onkeydown="if(event.key==='Enter')openTask('${t.task_id}')">
      <span class="badge b-${t.status}">${label(t.status)}</span>
      <span class="title">${escapeHtml(t.title || "(제목 없음)")}</span>
      <span class="meta"><code>${t.task_id.slice(0, 8)}</code>${t.created_at ? "· " + escapeHtml(String(t.created_at)) : ""}</span>
    </div>`).join("");
}

async function openTask(taskId) {
  current = taskId;
  renderTasks();   // 선택 강조 갱신
  const res = await fetch(`/api/v1/ingest/${taskId}/review`);
  const r = await res.json();
  currentSource8 = (r.source_id || "").slice(0, 8);
  const stagedTables = Object.entries(r.staged || {})
    .filter(([k, v]) => k !== "needs_review" && v.length)
    .map(([k, v]) => `<h4>staging.${k} (${v.length}행)</h4>` + htmlTable(v, k)).join("");
  const needsReview = (r.staged?.needs_review || []).length
    ? `<h4>스키마 검토 필요 (${r.staged.needs_review.length}건)</h4>` + htmlTable(r.staged.needs_review)
    : "";
  const contradictions = (r.contradictions || []).map((c, i) => `
    <div class="contradiction">
      <b>${escapeHtml(String(c.summary ?? ""))}</b> — ${escapeHtml(String(c.page ?? ""))}<br>기존: ${escapeHtml(String(c.existing ?? ""))} / 신규: ${escapeHtml(String(c.new ?? ""))}<br>
      <label><input type="radio" name="res${i}" value="keep"> 기존 유지</label>
      <label><input type="radio" name="res${i}" value="replace" checked> 신규 채택</label>
      <label><input type="radio" name="res${i}" value="both"> 병기</label>
    </div>`).join("");
  const suggestions = (r.suggestions || []).map(s => `<li>${escapeHtml(String(s.path))} (${escapeHtml(String(s.action))})</li>`).join("");
  const actions = r.status === "staged"
    ? `<div class="actions"><button id="approve" onclick="act('approve')">승인</button>
       <button id="reject" onclick="act('reject')">거부</button></div>`
    : `<div class="actions"><button class="btn-danger" onclick="deleteSource()">소스 삭제 (un-ingest)</button>
       <button class="btn-ghost" onclick="downloadOriginal()">원본 다운로드</button></div>`;
  $("#detail").innerHTML = `
    <h2><span class="badge b-${r.status}">${label(r.status)}</span> ${escapeHtml(r.title || "")}</h2>
    <p class="tid">${taskId}</p>
    ${actions}
    ${contradictions ? "<h3>모순 (" + r.contradictions.length + ")</h3>" + contradictions : ""}
    ${suggestions ? "<h3>갱신 제안 (미적용)</h3><ul>" + suggestions + "</ul>" : ""}
    ${stagedTables}${needsReview}
    <h3>위키 diff</h3><pre>${escapeHtml(r.wiki_diff || "(없음)")}</pre>`;
}

function htmlTable(rows, table) {
  if (!rows.length) return "";
  const cols = Object.keys(rows[0]);
  const excl = table && "id" in rows[0];  // 핵심 staging 표만 행 제외 지원
  const head = (excl ? "<th>제외</th>" : "") + cols.map(c => `<th>${escapeHtml(c)}</th>`).join("");
  const body = rows.map(r => {
    const cb = excl ? `<td><input type="checkbox" class="excl" data-table="${escapeHtml(table)}" data-id="${escapeHtml(String(r.id))}"></td>` : "";
    return `<tr>${cb}${cols.map(c => { const v = r[c]; const s = v !== null && typeof v === "object" ? JSON.stringify(v) : String(v ?? ""); return `<td>${escapeHtml(s)}</td>`; }).join("")}</tr>`;
  }).join("");
  return `<div class="tbl-wrap"><table><tr>${head}</tr>${body}</table></div>`;
}

function escapeHtml(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

async function act(action) {
  document.querySelectorAll("#approve, #reject").forEach(b => b.disabled = true);
  try {
    const body = { contradiction_resolutions: {}, exclude: {} };
    document.querySelectorAll(".excl:checked").forEach(cb => {
      (body.exclude[cb.dataset.table] ??= []).push(Number(cb.dataset.id));
    });
    // 모순 ID 규약은 log.md와 동일: {source_id 앞 8자}-{순번} (narrative.py가 기록하는 형식)
    document.querySelectorAll(".contradiction").forEach((el, i) => {
      const v = el.querySelector("input:checked");
      if (v) body.contradiction_resolutions[`${currentSource8}-${i + 1}`] = v.value;
    });
    const res = await fetch(`/api/v1/ingest/${current}/${action}`, {
      method: "POST",
      headers: { "X-Admin-Key": adminKey(), "Content-Type": "application/json" },
      body: action === "approve" ? JSON.stringify(body) : null,
    });
    alert(action + ": " + res.status + " " + (await res.text()).slice(0, 300));
    await loadList();
    if (res.ok) openTask(current);
  } finally {
    document.querySelectorAll("#approve, #reject").forEach(b => b.disabled = false);
  }
}

async function deleteSource() {
  if (!confirm("이 소스의 정식 데이터·원본·태스크를 삭제합니다. 병합된 위키 서술은 남습니다. 계속?")) return;
  const res = await fetch(`/api/v1/ingest/${current}/source`, {
    method: "DELETE", headers: { "X-Admin-Key": adminKey() },
  });
  alert("삭제: " + res.status + " " + (await res.text()).slice(0, 400));
  await loadList();
  if (res.ok) { current = null; $("#detail").innerHTML = `<div class="placeholder"><div class="big">◨</div>소스가 삭제되었습니다.</div>`; }
}

async function downloadOriginal() {
  const res = await fetch(`/api/v1/ingest/${current}/original`, {
    headers: { "X-Admin-Key": adminKey() },
  });
  if (!res.ok) return alert("원본 없음 (" + res.status + ")");
  const cd = res.headers.get("content-disposition") || "";
  const name = decodeURIComponent((cd.match(/filename\*?=(?:UTF-8'')?"?([^\";]+)/) || [])[1] || "original");
  const url = URL.createObjectURL(await res.blob());
  const a = document.createElement("a");
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

async function loadPage() {
  const path = $("#editpath").value.trim();
  if (!path) return;
  const res = await fetch(`/api/v1/wiki/page?path=${encodeURIComponent(path)}`);
  $("#editbody").value = res.ok ? (await res.json()).content_md : "";
  if (!res.ok) alert("새 페이지 (기존 없음) — 내용을 입력해 저장하세요");
}
async function savePage() {
  const path = $("#editpath").value.trim();
  const res = await fetch("/api/v1/wiki/page", {
    method: "PUT",
    headers: { "X-Admin-Key": adminKey(), "Content-Type": "application/json" },
    body: JSON.stringify({ path, content_md: $("#editbody").value }),
  });
  alert("저장: " + res.status + " " + (await res.text()).slice(0, 200));
}

// ── 부팅: 저장된 키가 유효하면 바로 콘솔, 아니면 게이트 ──
let refreshTimer = null;
(async () => {
  const saved = adminKey();
  if (saved && await verifyKey(saved)) enterConsole();
  else showGate();
})();
</script>
